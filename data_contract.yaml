data_product: asset_workorder_360
domain: operations_and_maintenance
owner: business_analytics_and_operational_insights
status: production_representative_example
grain: one_row_per_asset_per_work_order_per_production_date

primary_keys:
  - asset_id
  - work_order_id
  - production_date

mandatory_fields:
  - asset_id
  - work_order_id
  - asset_class
  - installation_name
  - criticality_level
  - status_code
  - backlog_flag
  - risk_score
  - production_date
  - uptime_pct

quality_rules:
  - asset_id must not be null
  - work_order_id must not be null
  - production_date must not be null
  - uptime_pct must be between 0 and 100
  - risk_score must be between 0 and 1
  - status_code must map to approved maintenance status values

sla:
  refresh_cadence: daily
  successful_refresh_target: 99.5_percent
  schema_change_notice: 30_days_for_breaking_changes

governance:
  classification: operationally_critical_internal_sensitive
  access_model: entra_id_role_based_access
  approved_uses:
    - maintenance_prioritisation
    - operational_reporting
    - ai_assisted_triage
    - decision_support
  restricted_uses:
    - autonomous_execution_of_field_actions
    - external_sharing_without_approval
    - customer_or_supplier_decisioning_without_human_review
